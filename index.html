<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCC Fogo</title>

    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

    <link rel="stylesheet" href="Style/Style.css">
    <link rel="stylesheet" href="Style/Style-Login.css">
</head>

<body>
    <!--Página de Login (Conectar a API do SUAP)-->

    <div class="login-page">
        <div class="header">
            <div class="logo">
                <img src="Imgs/fire-item.gif" alt="TCC-Fogo logo">
            </div>

            <h1>🔥TCC FOGO🔥</h1>

            <p>Sistema de monitoramento de incêndio do IFRN Campus Lajes</p>
        </div>

        <div class="login">
            <div class="form">
                <div class="matricula">
                    <span class="material-symbols-outlined">
                        badge
                    </span>

                    <input type="text" id="matricula" placeholder="Matrícula">
                </div>

                <div class="senha">
                    <span class="material-symbols-outlined">
                        password
                    </span>

                    <input type="password" name="senha" id="senha" placeholder="Senha">
                </div>
            </div>

            <button type="submit" id="login-button">LOGIN</button>
        </div>
    </div>
</body>

</html>
